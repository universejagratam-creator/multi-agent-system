server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        default_type application/json;
        return 200 '{"status":"running","service":"mas-hybrid-health"}';
    }

    location /health/ {
        proxy_pass http://localhost:8082/health;
        proxy_connect_timeout 5s;
    }

    location /health/rl {
        proxy_pass http://cto-trading-rl:8082/health;
        proxy_connect_timeout 5s;
    }

    location /health/hyper {
        proxy_pass http://cto-trading-hyper:8083/health;
        proxy_connect_timeout 5s;
    }

    location /health/commerce {
        proxy_pass http://cto-commerce:8084/health;
        proxy_connect_timeout 5s;
    }

    location /health/shield {
        proxy_pass http://ciso-shield:8085/health;
        proxy_connect_timeout 5s;
    }

    location /health/ecc {
        proxy_pass http://ciso-ecc:8086/health;
        proxy_connect_timeout 5s;
    }

    location /status {
        return 200 '{"service":"hybrid-mas","containers":["trading-rl","hypermamba","commerce","shield","ecc"]}';
    }
}
