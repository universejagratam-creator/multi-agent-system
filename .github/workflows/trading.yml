name: MAS Trading Pipeline

on:
  # Scheduled triggers - market hours analysis
  schedule:
    - cron: '30 13 * * 1-5'
    - cron: '0 20 * * 1-5'
    - cron: '0 0 * * *'
    - cron: '0 0 * * 0'
  # Manual trigger via GitHub UI or API
  workflow_dispatch:
    inputs:
      action:
        description: Action to execute
        required: true
        default: analyze
        type: choice
        options:
          - analyze   # Market analysis
          - alice     # Open Alice multi-market
          - trade     # Execute trade
          - backtest  # Run backtest
          - train     # Train model
          - report    # Generate report
      symbol:
        description: Trading symbol
        required: false
        default: BTC-USD
      mode:
        description: Execution mode
        required: false
        default: paper
        type: choice
        options:
          - paper
          - dry-run
          - live

env:
  DOCKER_TAG: latest
  PYTHON_VERSION: '3.11'

jobs:
  # Market analysis job - triggered by schedule or manual
  analyze:
    name: Market Analysis
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || inputs.action == 'analyze' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install numpy pandas anthropic requests 2>/dev/null
      - name: Run Market Analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MARKET_DATA_API_KEY: ${{ secrets.MARKET_DATA_API_KEY }}
          SYMBOL: ${{ inputs.symbol || 'BTC-USD,ETH-USD,SPY' }}
        run: |
          echo "Running market analysis for $SYMBOL..."
          echo "# Market Analysis Report" > /tmp/report.md
          echo "Symbol: $SYMBOL" >> /tmp/report.md
          echo "Date: $(date)" >> /tmp/report.md
      - name: Upload Analysis
        uses: actions/upload-artifact@v4
        with:
          name: market-analysis-${{ github.run_id }}
          path: /tmp/report.md
          retention-days: 7

  # Trade execution job - requires manual trigger
  trade:
    name: Execute Strategy
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'trade' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install numpy pandas anthropic requests 2>/dev/null
      - name: Execute Trade
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MARKET_DATA_API_KEY: ${{ secrets.MARKET_DATA_API_KEY }}
          TRADING_MODE: ${{ inputs.mode || 'paper' }}
          SYMBOL: ${{ inputs.symbol || 'BTC-USD' }}
        run: |
          echo "Executing $TRADING_MODE trade for $SYMBOL..."
          python trade.py --symbol "$SYMBOL" --mode "$TRADING_MODE" 2>/dev/null || echo "Simulated execution"

  # Backtest job - runs on schedule or manual
  backtest:
    name: Run Backtest
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || inputs.action == 'backtest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install numpy pandas 2>/dev/null
      - name: Run Backtest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MARKET_DATA_API_KEY: ${{ secrets.MARKET_DATA_API_KEY }}
        run: |
          python backtest.py --strategies conservative,aggressive,arbitrage --symbols BTC-USD,ETH-USD --output /tmp/backtest

  # ML model training job - manual trigger
  train:
    name: Train Model
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'train' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install numpy pandas torch --extra-index-url https://download.pytorch.org/whl/cpu 2>/dev/null
      - name: Train Model
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          MARKET_DATA_API_KEY: ${{ secrets.MARKET_DATA_API_KEY }}
        run: |
          python train.py --model behavioral-rl --epochs 100 --data-start 2024-01-01

  # Report generation job - manual trigger
  report:
    name: Generate Report
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'report' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install jinja2 markdown weasyprint
      - name: Generate PDF Report
        run: |
          python report_generator.py --format pdf --output /tmp/trading-report.pdf
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: trading-report-${{ github.run_id }}
          path: /tmp/trading-report.pdf
          retention-days: 90

  # Open Alice multi-market analysis - manual trigger
  alice:
    name: Open Alice Analysis
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'alice' || inputs.action == 'analyze' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            /tmp/openalice/node_modules
            ~/.local/share/pnpm/store
          key: openalice-${{ github.sha }}
          restore-keys: |
            openalice-
      - name: Install pnpm
        run: npm install -g pnpm@latest
      - name: Clone and Build Open Alice
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clean clone if directory exists but is invalid
          if [ -d /tmp/openalice ] && [ ! -f /tmp/openalice/package.json ]; then
            echo "Cleaning stale /tmp/openalice..."
            rm -rf /tmp/openalice
          fi
          # Clone repository
          if [ ! -d /tmp/openalice ]; then
            echo "Cloning OpenAlice repository..."
            git clone --depth 1 https://github.com/TraderAlice/OpenAlice.git /tmp/openalice 2>&1
            if [ $? -ne 0 ] || [ ! -f /tmp/openalice/package.json ]; then
              echo "ERROR: Git clone failed. Repo may be private or unreachable."
              echo "Running analysis without OpenAlice code..."
              mkdir -p /tmp/openalice
            fi
          fi
          # Install dependencies if needed
          if [ -f /tmp/openalice/package.json ]; then
            cd /tmp/openalice
            if [ ! -d node_modules ] || [ ! -f node_modules/.package-lock.json ]; then
              echo "Installing dependencies..."
              pnpm install --frozen-lockfile 2>&1 || pnpm install 2>&1 || echo "pnpm install failed, continuing with fallback"
            fi
          fi
      - name: Run Alice Market Analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SYMBOLS: ${{ inputs.symbol || 'SPY,AAPL,MSFT,BTC-USD,ETH-USD,EUR-USD,XAU-USD' }}
          MODE: ${{ inputs.mode || 'paper' }}
        run: |
          echo "=== Open Alice Analysis ==="
          echo "Symbols: $SYMBOLS | Mode: $MODE"
          REPORT_FILE=/tmp/alice-report.md
          echo "# Open Alice Multi-Market Analysis Report" > "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "## Markets: SPY, AAPL, MSFT (Stocks) | BTC-USD, ETH-USD (Crypto) | EUR-USD (Forex) | XAU-USD (Gold)" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "Full deployment required for real-time analysis." >> "$REPORT_FILE"
          cat "$REPORT_FILE"
      - name: Upload Alice Report
        uses: actions/upload-artifact@v4
        with:
          name: alice-analysis-${{ github.run_id }}
          path: /tmp/alice-report.md
          retention-days: 7

  # Security audit job - manual trigger
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install pyyaml rich 2>/dev/null
      - name: Run Security Audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          grep -rn 'sk-ant-\|sk-\|ghp_\|AKIA' --include='*.py' --include='*.sh' --include='*.yml' --include='*.yaml' --include='*.json' . 2>/dev/null | grep -v '.git/' | grep -v '__pycache__' > /tmp/vulnerabilities.txt || true
          echo "Found $(wc -l < /tmp/vulnerabilities.txt) potential secrets"
      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-${{ github.run_id }}
          path: security-report.json

  # Notification job - runs after all trading jobs
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [analyze, trade, backtest, train, alice]
    if: always()
    steps:
      - name: Send Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          STATUS='${{ needs.analyze.result }}'
          if [[ -n "$DISCORD_WEBHOOK" ]]; then
            curl -X POST -H "Content-Type: application/json" -d "{\"content\": \"MAS Trading Pipeline: $STATUS\"}" "$DISCORD_WEBHOOK"
          else
            echo "No Discord webhook. Status: $STATUS"
          fi
