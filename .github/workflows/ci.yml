name: MAS CI - Validation Pipeline

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'docker-compose*.yml'
      - '.github/workflows/*.yml'
      - 'setup.sh'
      - 'services/**/*'
      - 'scripts/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  ###########################################################################
  # JOB 1: YAML LINT - Validasi syntax semua YAML files
  ###########################################################################
  yaml-lint:
    name: 'YAML Lint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML files
        run: |
          echo "=== Validating docker-compose files ==="
          for f in docker-compose.yml docker-compose.lightweight.yml docker-compose.minimal.yml docker-compose.hybrid.yml docker-compose.override.yml; do
            if [[ -f "$f" ]]; then
              python -c "import yaml; yaml.safe_load(open('$f')); print(f'  ✅ $f: valid')"
            fi
          done

          echo "=== Validating workflow files ==="
          for f in .github/workflows/*.yml; do
            python -c "import yaml; yaml.safe_load(open('$f')); print(f'  ✅ $f: valid')"
          done

  ###########################################################################
  # JOB 2: SHELLCHECK - Validasi shell scripts
  ###########################################################################
  shellcheck:
    name: 'ShellCheck'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'
          severity: warning
          ignore_paths: >
            .git
            node_modules
            workspace
            data
            secrets

  ###########################################################################
  # JOB 3: DOCKER COMPOSE LINT - Validasi compose files consistency
  ###########################################################################
  compose-lint:
    name: 'Compose Lint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose Config
        run: |
          for f in docker-compose.yml docker-compose.lightweight.yml docker-compose.minimal.yml docker-compose.hybrid.yml; do
            if [[ -f "$f" ]]; then
              echo "=== Validating $f ==="
              docker compose -f "$f" config --quiet 2>&1 && echo "  ✅ $f: valid" || echo "  ❌ $f: invalid"
            fi
          done

      - name: Check for Duplicate Ports
        run: |
          PORTS=$(grep -roh '"[0-9]\+:808[0-9]\+"' --include='docker-compose*.yml' . 2>/dev/null | sort | uniq -d || true)
          if [ -n "$PORTS" ]; then
            echo "⚠️ Duplicate ports found: $PORTS"
          else
            echo "✅ No duplicate ports"
          fi
          # Check Open Alice unique ports (47331-3)
          grep -q '47331' docker-compose.hybrid.yml 2>/dev/null && echo "✅ Open Alice port 47331 found" || echo "⚠️ Open Alice port 47331 missing"
          grep -q '47332' docker-compose.hybrid.yml 2>/dev/null && echo "✅ Open Alice port 47332 found" || echo "⚠️ Open Alice port 47332 missing"
          grep -q '47333' docker-compose.hybrid.yml 2>/dev/null && echo "✅ Open Alice port 47333 found" || echo "⚠️ Open Alice port 47333 missing"

      - name: Check Port Consistency
        run: |
          echo "=== Checking port conflicts ==="
          ports=$(grep -roh 'published: [0-9]*\|"[0-9]*:[0-9]*"' docker-compose*.yml 2>/dev/null | grep -oP '[0-9]+' | sort -n | uniq -d)
          if [[ -n "$ports" ]]; then
            echo "❌ Port conflicts found: $ports"
            exit 1
          else
            echo "✅ No port conflicts"
          fi

      - name: Check Container Name Consistency
        run: |
          echo "=== Checking container names ==="
          for f in docker-compose.yml docker-compose.lightweight.yml docker-compose.minimal.yml docker-compose.hybrid.yml; do
            if [[ -f "$f" ]]; then
              names=$(grep 'container_name:' "$f" | awk '{print $2}' | sort)
              echo "$f:"
              echo "$names" | sed 's/^/  /'
            fi
          done

  ###########################################################################
  # JOB 4: SECRET VALIDATION - Cek hardcoded secrets
  ###########################################################################
  secret-validation:
    name: 'Secret Validation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Hardcoded Secrets
        run: |
          echo "=== Scanning for hardcoded API keys ==="
          patterns=("sk-ant-" "AKIA" "ghp_" "sk-proj-")
          found=0
          for pattern in "${patterns[@]}"; do
            results=$(grep -rn "$pattern" --include='*.py' --include='*.sh' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.md' . 2>/dev/null | grep -v '.git/' | grep -v '__pycache__' | grep -v 'secrets/' | grep -v '.env.example' || true)
            if [[ -n "$results" ]]; then
              echo "❌ Found potential secrets matching '$pattern':"
              echo "$results"
              found=$((found + 1))
            fi
          done
          if [[ $found -eq 0 ]]; then
            echo "✅ No hardcoded secrets found"
          else
            echo "⚠️  Found $found potential secrets - review above"
          fi

  ###########################################################################
  # JOB 5: BUILD SIMULATION - Cek Dockerfiles bisa di-build (dry run)
  ###########################################################################
  dockerfile-check:
    name: 'Dockerfile Check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Dockerfiles
        run: |
          for dir in services/*/; do
            if [[ -f "${dir}Dockerfile" ]]; then
              name=$(basename "$dir")
              echo "=== Checking ${name}/Dockerfile ==="
              docker pull python:3.11-slim --quiet 2>/dev/null || true
              # Only syntax check, not full build (too slow)
              head -5 "${dir}Dockerfile"
              echo "  ✅ $name: Dockerfile exists"
            fi
          done

  ###########################################################################
  # JOB 6: WORKFLOW DRY RUN - Simulasi GitHub Actions workflow
  ###########################################################################
  workflow-dryrun:
    name: 'Workflow Dry Run'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Workflow Syntax
        run: |
          for f in .github/workflows/*.yml; do
            echo "=== Validating $f ==="
            # Check required fields
            if ! grep -q 'name:' "$f"; then
              echo "  ❌ Missing 'name:' field"
              exit 1
            fi
            if ! grep -q 'on:' "$f"; then
              echo "  ❌ Missing 'on:' trigger"
              exit 1
            fi
            if ! grep -q 'jobs:' "$f"; then
              echo "  ❌ Missing 'jobs:' section"
              exit 1
            fi
            python -c "
import yaml
with open('$f') as fh:
    data = yaml.safe_load(fh)
    jobs = data.get('jobs', {})
    for job_name, job_data in jobs.items():
        steps = job_data.get('steps', [])
        if not steps:
            print(f'  ⚠️  Job \"{job_name}\" has no steps')
        else:
            print(f'  ✅ Job \"{job_name}\": {len(steps)} steps')
        # Check for uses/run requirement
        for step in steps:
            if not step.get('uses') and not step.get('run'):
                print(f'    ⚠️  Step missing both uses and run')
"
            echo "  ✅ $f: valid workflow"
          done

  ###########################################################################
  # JOB 7: SETUP.SH SYNTAX CHECK
  ###########################################################################
  setup-check:
    name: 'Setup Script Check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check setup.sh syntax
        run: |
          bash -n setup.sh && echo "✅ setup.sh: syntax OK"
          bash -n scripts/remote-sync.sh && echo "✅ remote-sync.sh: syntax OK"
          bash -n scripts/cloud-init.sh && echo "✅ cloud-init.sh: syntax OK"

  ###########################################################################
  # SUMMARY
  ###########################################################################
  summary:
    name: 'CI Summary'
    runs-on: ubuntu-latest
    needs: [yaml-lint, shellcheck, compose-lint, secret-validation, dockerfile-check, workflow-dryrun, setup-check]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "=========================================="
          echo "  MAS CI Pipeline Results"
          echo "=========================================="
          echo ""
          echo "YAML Lint:         ${{ needs.yaml-lint.result }}"
          echo "ShellCheck:        ${{ needs.shellcheck.result }}"
          echo "Compose Lint:      ${{ needs.compose-lint.result }}"
          echo "Secret Validation: ${{ needs.secret-validation.result }}"
          echo "Dockerfile Check:  ${{ needs.dockerfile-check.result }}"
          echo "Workflow Dry Run:  ${{ needs.workflow-dryrun.result }}"
          echo "Setup Script:      ${{ needs.setup-check.result }}"
          echo ""
          if [[ "${{ needs.yaml-lint.result }}" == "success" && \
                "${{ needs.compose-lint.result }}" == "success" && \
                "${{ needs.workflow-dryrun.result }}" == "success" ]]; then
            echo "✅ All critical checks passed!"
          else
            echo "⚠️  Some checks failed - review above"
          fi
